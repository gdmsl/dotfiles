# hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

# BACKGROUND
background {
    monitor =
    path = screenshot
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# AUTHENTICATION
# hyprlock has two independent auth backends that run at the same time:
#
#   - pam:         the password path. We point it at a dedicated "hyprlock"
#                  PAM service (defined in system/default.nix) that only does
#                  password auth — no fingerprint in the PAM stack.
#   - fingerprint: hyprlock's *native* fingerprint path. It talks to fprintd
#                  directly over D-Bus and is active from the moment the lock
#                  screen appears, in parallel with the password field.
#
# Running them concurrently is what gives true "touch the sensor any time, OR
# type your password" behaviour. (The old `general { pam_module = sudo }` had
# fingerprint living inside the PAM stack, which only ran *after* you submitted
# the input field — that was the "type something + Enter first" weirdness.)
auth {
    pam {
        enabled = true
        module = hyprlock
    }
    fingerprint {
        enabled = true
        ready_message = (or scan fingerprint to unlock)
        present_message = Scanning fingerprint...
        retry_delay = 250 # ms to wait before re-arming the sensor after a failed scan
    }
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 80
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##cdd6f4">Password...</span></i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-H:%M")"
    font_size = 120
    font_family = Maple Mono Bold
    position = 0, -300
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text = Hi there, $USER
    font_size = 25
    font_family = Maple Mono
    position = 0, -40
    halign = center
    valign = center
}

# vim: ft=conf
