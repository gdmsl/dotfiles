# Idle configuration for hypridle
#
# Dim screen → keyboard off → lock → DPMS off → suspend-then-hibernate
#
# hypridle registers a systemd sleep inhibitor (so the lock lands *before* the
# machine suspends) and listens for logind's Lock / Unlock signals — so
# `loginctl lock-session` (and lid-close, via before_sleep_cmd) reliably
# triggers hyprlock. niri handles the same ext-idle-notify / ext-session-lock
# protocols hypridle and hyprlock use.

general {
    # avoid starting multiple hyprlock instances.
    lock_cmd = pidof hyprlock || hyprlock

    # lock before suspend.
    before_sleep_cmd = loginctl lock-session

    # restore display after sleep (compositor-agnostic).
    after_sleep_cmd = sh -c 'if pgrep -x niri >/dev/null; then niri msg action power-on-monitors; else hyprctl dispatch dpms on; fi'
}

# Set monitor backlight to 10% when idle (after 2.5 min)
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Turn off keyboard backlight when idle (after 2.5 min)
listener {
    timeout = 150
    on-timeout = brightnessctl -sd dell::kbd_backlight set 0
    on-resume = brightnessctl -rd dell::kbd_backlight
}

# Idle marker for the OneDrive sync guard (after 2.5 min): the file exists only
# while the session is idle, letting scheduled syncs run even with an editor
# open; it's removed on the first input so active editing still blocks a sync.
# See onedrive-sync-guard in home/scripts.nix. Wrapped in `sh -c` so $HOME
# expands regardless of whether hypridle spawns via a shell.
listener {
    timeout = 150
    on-timeout = sh -c 'touch "$HOME/.cache/user-idle"'
    on-resume = sh -c 'rm -f "$HOME/.cache/user-idle"'
}

# Lock screen when idle (after 5 min)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off screen when idle (after 5.5 min)
listener {
    timeout = 330
    on-timeout = sh -c 'if pgrep -x niri >/dev/null; then niri msg action power-off-monitors; else hyprctl dispatch dpms off; fi'
    on-resume = sh -c 'if pgrep -x niri >/dev/null; then niri msg action power-on-monitors; else hyprctl dispatch dpms on; fi'
}

# Suspend-then-hibernate when idle (after 30 min)
listener {
    timeout = 1800
    on-timeout = systemctl suspend-then-hibernate
}

# vim: ft=conf
