# Setup the XDG environment
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XAUTHORITY

# Gnome Keyring (D-Bus activated, but needs components hint)
exec-once = uwsm app -- gnome-keyring-daemon --start --components=pkcs11,secrets,ssh

# ── Managed by systemd (see run_once_install-hyprland.sh) ───────────
# noctalia-shell, kanshi, hyprpolkitagent, vicinae, cliphist, hypridle, hyprpaper, udiskie

# nm-applet: handled by XDG autostart (xdg-desktop-autostart.target)

# Shader engines
exec-once = uwsm app -- hyprshade auto

# Monitor rotation
exec-once = uwsm app -- iio-hyprland

# Plugin system
exec-once = uwsm app -- hyprpm reload -n

# vim: ft=conf
